<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Split-Flap Card preview</title>
  <desc id="desc">Product preview graphic for Split-Flap Card, a Home Assistant Lovelace custom card.</desc>

  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060606"/>
      <stop offset="55%" stop-color="#0b0b0b"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171717"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>

    <linearGradient id="flapTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="52%" stop-color="#171717"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>

    <linearGradient id="flapBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="48%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>

    <linearGradient id="tileGloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="18%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="panelShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000000" flood-opacity="0.75"/>
    </filter>

    <filter id="tileShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.72"/>
    </filter>

    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#DCB215" flood-opacity="0.22"/>
    </filter>

    <style>
      .headline {
        font-family: Inter, Arial, sans-serif;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .subline {
        font-family: Inter, Arial, sans-serif;
        font-weight: 500;
      }

      .tileText {
        font-family: "Roboto Mono", "Courier New", monospace;
        font-weight: 900;
        font-size: 52px;
        fill: #DCB215;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .codeText {
        font-family: "Roboto Mono", "Courier New", monospace;
        font-weight: 800;
      }
    </style>
  </defs>

