name: Build check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: npm run check
