<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">Split-Flap Card logo</title>
  <desc id="desc">Airport terminal inspired Split-Flap Card logo with mechanical flap tiles and high-contrast signage typography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071014"/>
      <stop offset="1" stop-color="#111d23"/>
    </linearGradient>
    <linearGradient id="tileTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3336"/>
      <stop offset="1" stop-color="#151b1e"/>
    </linearGradient>
    <linearGradient id="tileBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12171a"/>
      <stop offset="1" stop-color="#050708"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="960" height="260" rx="34" fill="url(#bg)"/>
  <g transform="translate(54 50)" filter="url(#shadow)">
    <rect x="0" y="0" width="228" height="160" rx="24" fill="#030303" stroke="#263942" stroke-width="3"/>
    <g transform="translate(24 28)">
      <g>
        <rect x="0" y="0" width="48" height="104" rx="10" fill="#0b0b0b" stroke="#333"/>
        <rect x="0" y="0" width="48" height="52" rx="10" fill="url(#tileTop)"/>
        <rect x="0" y="52" width="48" height="52" rx="10" fill="url(#tileBottom)"/>
        <rect x="0" y="51" width="48" height="3" fill="#010101"/>
        <text x="24" y="71" text-anchor="middle" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="58" font-weight="900" fill="#f7d53b">S</text>
      </g>
      <g transform="translate(66 0)">
        <rect x="0" y="0" width="48" height="104" rx="10" fill="#0b0b0b" stroke="#333"/>
        <rect x="0" y="0" width="48" height="52" rx="10" fill="url(#tileTop)"/>
        <rect x="0" y="52" width="48" height="52" rx="10" fill="url(#tileBottom)"/>
        <rect x="0" y="51" width="48" height="3" fill="#010101"/>
        <text x="24" y="71" text-anchor="middle" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="58" font-weight="900" fill="#f7d53b">F</text>
      </g>
      <g transform="translate(132 0)">
        <rect x="0" y="0" width="48" height="104" rx="10" fill="#0b0b0b" stroke="#333"/>
        <rect x="0" y="0" width="48" height="52" rx="10" fill="url(#tileTop)"/>
        <rect x="0" y="52" width="48" height="52" rx="10" fill="url(#tileBottom)"/>
        <rect x="0" y="51" width="48" height="3" fill="#010101"/>
        <path d="M16 32h19v12H24v31h-8z" fill="#f7d53b"/>
      </g>
    </g>
  </g>
  <g transform="translate(324 74)">
    <text x="0" y="48" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="64" font-weight="900" fill="#f5f7f9" letter-spacing="1">SPLIT-FLAP</text>
    <text x="0" y="104" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="52" font-weight="800" fill="#f7d53b" letter-spacing="4">CARD</text>
    <rect x="0" y="128" width="470" height="4" rx="2" fill="#f7d53b"/>
    <text x="0" y="160" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#b9c6cf">HOME ASSISTANT · TERMINAL UI · MECHANICAL DISPLAY</text>
  </g>
